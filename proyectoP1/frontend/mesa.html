<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickOrder - Haz tu pedido</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="header">
        <h1>QuickOrder 🍔</h1>
        <div class="mesa-info">Mesa: <span id="mesa-numero">...</span></div>
    </header>

    <main class="container">
        <nav class="tabs">
            <button class="tab-btn active" onclick="showTab('menu')">Menú</button>
            <button class="tab-btn" onclick="showTab('combos')">Combos</button>
        </nav>

        <section id="menu" class="tab-content active">
            <div class="grid-productos" id="lista-menu">
            </div>
        </section>

        <section id="combos" class="tab-content">
            <div class="grid-productos" id="lista-combos">
            </div>
        </section>
    </main>

    <button class="fab-carrito" onclick="toggleCarrito()">
        🛒 Ver Pedido (<span id="carrito-count">0</span>)
    </button>

    <div id="carrito-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleCarrito()">&times;</span>
            <h2>Tu Comanda Actual</h2>
            <div id="carrito-items" class="carrito-list">
            </div>
            <div class="carrito-footer">
                <button class="btn-primary" onclick="confirmarPedido()">Confirmar Pedido ✅</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
