<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickOrder - Estado del Pedido</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="header">
        <h1>QuickOrder 🍔</h1>
    </header>

    <main class="container" style="display: flex; flex-direction: column; align-items: center; margin-top: 3rem;">

        <div class="card" style="width: 100%; max-width: 500px; text-align: center; padding: 2.5rem 1.5rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
            <h2 style="color: #4CAF50; margin-bottom: 1rem;">¡Pedido Confirmado!</h2>
            <p style="color: var(--text-dark); margin-bottom: 2rem;">
                Tu comanda ha sido enviada exitosamente a la cocina y pronto comenzarán a prepararla.
            </p>

            <div style="background-color: #FFF3E0; border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem;">
                <p style="color: #666; font-size: 0.9rem; text-transform: uppercase; font-weight: bold;">Estado actual:</p>
                <div style="font-size: 1.8rem; font-weight: bold; color: var(--primary-dark); margin-top: 0.5rem;">
                    👩‍🍳 En Preparación
                </div>
            </div>

            <a href="index.html" class="tab-btn active" style="text-decoration: none; display: inline-block; width: 100%; text-align: center;">
                Cerrar y volver al inicio
            </a>
        </div>

    </main>
</body>

</html>
